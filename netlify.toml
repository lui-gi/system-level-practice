[build]
  command   = "npm run build --workspace=client"
  publish   = "client/dist"
  functions = "netlify/functions"

[functions]
  included_files = ["resources/**", "slides/**"]

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* requests to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — required for React Router client-side routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
