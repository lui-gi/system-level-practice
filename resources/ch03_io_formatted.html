<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Formatted I/O</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="qz-wrap">
  <div class="qz-header">
    <span class="qz-badge badge-ch03">Chapter 3</span>
    <div class="qz-title">Formatted I/O</div>
    <div class="qz-desc"><code>printf</code> / <code>scanf</code>, format specifiers, whitespace handling with <code>%c</code></div>
  </div>
  <div id="quiz-body"></div>
  <button class="submit-btn" id="submit-btn" onclick="grade()">Submit Quiz</button>
  <div id="results"></div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  .qz-wrap { font-family: 'Poppins', system-ui, sans-serif; max-width: 720px; color: #171717; }
  .qz-header { margin-bottom: 1.5rem; }
  .qz-badge { font-size: .6rem; font-weight: 500; letter-spacing: .1em;
    text-transform: uppercase; padding: .2rem .6rem; border-radius: .375rem;
    display: inline-block; margin-bottom: .4rem;
    background: #f5f5f5; color: #737373; border: 1px solid #e5e5e5; }
  .qz-title { font-size: 1.35rem; font-weight: 600; letter-spacing: -.01em; margin: .25rem 0 .4rem; }
  .qz-desc  { color: #737373; font-size: .875rem; line-height: 1.5; }
  .q-card { border: 1px solid #e5e5e5; border-radius: .375rem; padding: 1.25rem; margin-bottom: 1rem; }
  .q-type { font-size: .6rem; font-weight: 500; letter-spacing: .1em;
    text-transform: uppercase; padding: .15rem .5rem; border-radius: .25rem;
    display: inline-block; margin-bottom: .6rem;
    background: #f5f5f5; color: #737373; border: 1px solid #e5e5e5; }
  .q-prompt { margin: .5rem 0 .75rem; font-size: .9rem; line-height: 1.6; }
  pre { background: #111; color: #e5e5e5; padding: .9rem 1rem;
    border-radius: .375rem; overflow-x: auto; font-size: .8rem;
    border-left: 3px solid hsl(173,53%,19%); margin: .75rem 0; white-space: pre; }
  .mcq-opts { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
  .mcq-btn { padding: .375rem .875rem; border: 1.5px solid #e5e5e5;
    border-radius: .375rem; background: #fff; cursor: pointer; color: #171717;
    font-size: .875rem; font-family: 'Poppins', sans-serif; transition: all .15s; }
  .mcq-btn:hover:not(:disabled) { border-color: hsl(173,53%,19%); background: #f5f5f5; }
  .mcq-btn.selected { border-color: hsl(173,53%,19%); background: hsl(173,30%,94%); font-weight: 500; }
  .mcq-btn:disabled { cursor: default; }
  .mcq-btn.correct { border-color: #16a34a; background: #dcfce7; color: #166534; }
  .mcq-btn.wrong   { border-color: #dc2626; background: #fee2e2; color: #991b1b; }
  .trace-input { width: 100%; margin-top: .5rem; padding: .5rem;
    font-family: 'Poppins', monospace; font-size: .875rem; border: 1.5px solid #e5e5e5;
    border-radius: .375rem; resize: vertical; min-height: 60px; color: #171717; }
  .trace-input:focus { outline: none; border-color: hsl(173,53%,19%); }
  .trace-input:disabled { background: #f9fafb; }
  .submit-btn { display: block; margin: 1.5rem auto; padding: .5rem 2rem;
    background: hsl(173,53%,19%); color: #fafafa; border: none; border-radius: .375rem;
    font-size: .875rem; font-weight: 500; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: opacity .15s; }
  .submit-btn:hover { opacity: .88; }
  .submit-btn:disabled { opacity: .45; cursor: default; }
  #results { display: none; border-top: 1px solid #e5e5e5; padding-top: 1.25rem; margin-top: 1rem; }
  .score-head { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
  .r-row { padding: .6rem .75rem; border-radius: .375rem; margin-bottom: .5rem; font-size: .875rem; }
  .r-correct { background: #dcfce7; color: #166534; }
  .r-wrong   { background: #fee2e2; color: #991b1b; }
  .r-exp { font-size: .8rem; margin-top: .25rem; opacity: .85; }
</style>

<script>
const questions = [
  {
    id: 1,
    type: "mcq",
    prompt: "What is true about <code>scanf(\"%d %d\", &a, &b)</code> vs <code>scanf(\"%d%d\", &a, &b)</code> when reading integers?",
    options: [
      "A) They behave identically in practice",
      "B) The space version reads only one integer",
      "C) Without a space, scanf fails to read the second integer",
      "D) The space version skips the first integer"
    ],
    answer: "A) They behave identically in practice",
    explanation: "For numeric format specifiers like <code>%d</code>, scanf automatically skips leading whitespace (spaces, tabs, newlines) before each value. The explicit space in the format string does the same thing, so both versions work identically."
  },
  {
    id: 2,
    type: "mcq",
    prompt: "What is the key difference between <code>scanf(\"%c %c\", &a, &b)</code> and <code>scanf(\"%c%c\", &a, &b)</code>?",
    options: [
      "A) No difference — both work the same for characters",
      "B) The version with a space skips whitespace (like newlines) before reading the second char; without the space, it reads every character including whitespace",
      "C) The version without a space skips whitespace automatically",
      "D) The space version reads two characters at once"
    ],
    answer: "B) The version with a space skips whitespace (like newlines) before reading the second char; without the space, it reads every character including whitespace",
    explanation: "Unlike <code>%d</code>, <code>%c</code> does NOT skip whitespace on its own. A space in the format string explicitly tells scanf to skip any whitespace characters. Without the space, <code>%c</code> reads the very next character — which could be a newline from pressing Enter."
  },
  {
    id: 3,
    type: "mcq",
    prompt: "Which format specifier is used to read a single <code>char</code> with <code>scanf</code>?",
    options: ["A) %s", "B) %i", "C) %c", "D) %ch"],
    answer: "C) %c",
    explanation: "<code>%c</code> reads exactly one character. <code>%s</code> reads a string (until whitespace). <code>%i</code> reads an integer. There is no <code>%ch</code> specifier."
  },
  {
    id: 4,
    type: "mcq",
    prompt: "Why does <code>scanf(\"%d\", &x)</code> require <code>&x</code> (the address operator), but <code>scanf(\"%s\", str)</code> does NOT use <code>&str</code> when <code>str</code> is a char array?",
    options: [
      "A) Strings are passed by value automatically",
      "B) An array name already decays to a pointer to its first element, so no & is needed",
      "C) %s ignores the address and copies data directly",
      "D) Using & with an array causes a compile error"
    ],
    answer: "B) An array name already decays to a pointer to its first element, so no & is needed",
    explanation: "<code>scanf</code> always needs an address so it can write the value into the variable. For a plain <code>int x</code>, you must take its address with <code>&x</code>. For an array like <code>char str[20]</code>, the name <code>str</code> already evaluates to the address of <code>str[0]</code>, so no <code>&</code> is needed."
  },
  {
    id: 5,
    type: "mcq",
    prompt: "Consider the following. If the user types <code>A</code> then presses Enter, then types <code>B</code>, what character is stored in <code>b</code>?",
    code: 'char a, b;\nscanf("%c%c", &a, &b);',
    options: [
      "A) 'B'",
      "B) '\\n' (newline)",
      "C) 'A'",
      "D) Nothing — scanf waits for a non-whitespace character"
    ],
    answer: "B) '\\n' (newline)",
    explanation: "With <code>%c%c</code> (no space), the first <code>%c</code> reads <code>'A'</code> and the second <code>%c</code> reads the very next character in the input buffer — which is the newline (<code>'\\n'</code>) produced by pressing Enter. <code>'B'</code> is never read."
  }
];

const container = document.getElementById("quiz-body");
questions.forEach((q, i) => {
  const card = document.createElement("div");
  card.className = "q-card";
  card.innerHTML = `
    <span class="q-type type-${q.type}">${q.type}</span>
    <p class="q-prompt"><strong>Q${i+1}.</strong> ${q.prompt}</p>
    ${q.code ? `<pre>${q.code}</pre>` : ""}
    <div id="input-${q.id}"></div>`;
  container.appendChild(card);

  const inputArea = document.getElementById(`input-${q.id}`);
  if (q.type === "mcq") {
    const wrap = document.createElement("div");
    wrap.className = "mcq-opts";
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "mcq-btn";
      btn.textContent = opt;
      btn.dataset.qid = q.id;
      btn.onclick = () => {
        wrap.querySelectorAll(".mcq-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      };
      wrap.appendChild(btn);
    });
    inputArea.appendChild(wrap);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "trace-input";
    ta.id = `ta-${q.id}`;
    ta.placeholder = "Type the output or value…";
    inputArea.appendChild(ta);
  }
});

function grade() {
  let correct = 0;
  const rows = [];
  questions.forEach((q, i) => {
    let userAns = "";
    if (q.type === "mcq") {
      const sel = document.querySelector(`#input-${q.id} .mcq-btn.selected`);
      userAns = sel ? sel.textContent.trim() : "";
      document.querySelectorAll(`#input-${q.id} .mcq-btn`).forEach(btn => {
        btn.disabled = true;
        if (btn.textContent.trim() === q.answer) btn.classList.add("correct");
        else if (btn.classList.contains("selected")) btn.classList.add("wrong");
      });
    } else {
      const ta = document.getElementById(`ta-${q.id}`);
      userAns = ta ? ta.value.trim() : "";
      ta.disabled = true;
    }
    const ok = userAns === q.answer;
    if (ok) correct++;
    rows.push({ q, i, ok, userAns });
  });

  const res = document.getElementById("results");
  res.style.display = "block";
  const pct = Math.round(correct / questions.length * 100);
  res.innerHTML = `
    <div class="score-head">Score: ${correct} / ${questions.length} (${pct}%)</div>
    ${rows.map(({q, i, ok, userAns}) => `
      <div class="r-row ${ok ? "r-correct" : "r-wrong"}">
        ${ok ? "✓" : "✗"} <strong>Q${i+1}</strong>
        ${ok ? "— Correct" : `— Your answer: <code>${userAns || "(none)"}</code> &nbsp;|&nbsp; Expected: <code>${q.answer}</code>`}
        ${!ok ? `<div class="r-exp">${q.explanation}</div>` : ""}
      </div>`).join("")}`;
  document.getElementById("submit-btn").disabled = true;
}
</script>
</body>
</html>
