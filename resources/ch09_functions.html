<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Functions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="qz-wrap">
  <div class="qz-header">
    <span class="qz-badge badge-ch09">Chapter 9</span>
    <div class="qz-title">Functions</div>
    <div class="qz-desc">Call by value vs call by address, static variables, global variables, scope and lifetime</div>
  </div>
  <div id="quiz-body"></div>
  <button class="submit-btn" id="submit-btn" onclick="grade()">Submit Quiz</button>
  <div id="results"></div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  .qz-wrap { font-family: 'Poppins', system-ui, sans-serif; max-width: 720px; color: #171717; }
  .qz-header { margin-bottom: 1.5rem; }
  .qz-badge { font-size: .6rem; font-weight: 500; letter-spacing: .1em;
    text-transform: uppercase; padding: .2rem .6rem; border-radius: .375rem;
    display: inline-block; margin-bottom: .4rem;
    background: #f5f5f5; color: #737373; border: 1px solid #e5e5e5; }
  .qz-title { font-size: 1.35rem; font-weight: 600; letter-spacing: -.01em; margin: .25rem 0 .4rem; }
  .qz-desc  { color: #737373; font-size: .875rem; line-height: 1.5; }
  .q-card { border: 1px solid #e5e5e5; border-radius: .375rem; padding: 1.25rem; margin-bottom: 1rem; }
  .q-type { font-size: .6rem; font-weight: 500; letter-spacing: .1em;
    text-transform: uppercase; padding: .15rem .5rem; border-radius: .25rem;
    display: inline-block; margin-bottom: .6rem;
    background: #f5f5f5; color: #737373; border: 1px solid #e5e5e5; }
  .q-prompt { margin: .5rem 0 .75rem; font-size: .9rem; line-height: 1.6; }
  pre { background: #111; color: #e5e5e5; padding: .9rem 1rem;
    border-radius: .375rem; overflow-x: auto; font-size: .8rem;
    border-left: 3px solid hsl(173,53%,19%); margin: .75rem 0; white-space: pre; }
  .mcq-opts { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
  .mcq-btn { padding: .375rem .875rem; border: 1.5px solid #e5e5e5;
    border-radius: .375rem; background: #fff; cursor: pointer; color: #171717;
    font-size: .875rem; font-family: 'Poppins', sans-serif; transition: all .15s; }
  .mcq-btn:hover:not(:disabled) { border-color: hsl(173,53%,19%); background: #f5f5f5; }
  .mcq-btn.selected { border-color: hsl(173,53%,19%); background: hsl(173,30%,94%); font-weight: 500; }
  .mcq-btn:disabled { cursor: default; }
  .mcq-btn.correct { border-color: #16a34a; background: #dcfce7; color: #166534; }
  .mcq-btn.wrong   { border-color: #dc2626; background: #fee2e2; color: #991b1b; }
  .trace-input { width: 100%; margin-top: .5rem; padding: .5rem;
    font-family: 'Poppins', monospace; font-size: .875rem; border: 1.5px solid #e5e5e5;
    border-radius: .375rem; resize: vertical; min-height: 60px; color: #171717; }
  .trace-input:focus { outline: none; border-color: hsl(173,53%,19%); }
  .trace-input:disabled { background: #f9fafb; }
  .submit-btn { display: block; margin: 1.5rem auto; padding: .5rem 2rem;
    background: hsl(173,53%,19%); color: #fafafa; border: none; border-radius: .375rem;
    font-size: .875rem; font-weight: 500; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: opacity .15s; }
  .submit-btn:hover { opacity: .88; }
  .submit-btn:disabled { opacity: .45; cursor: default; }
  #results { display: none; border-top: 1px solid #e5e5e5; padding-top: 1.25rem; margin-top: 1rem; }
  .score-head { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
  .r-row { padding: .6rem .75rem; border-radius: .375rem; margin-bottom: .5rem; font-size: .875rem; }
  .r-correct { background: #dcfce7; color: #166534; }
  .r-wrong   { background: #fee2e2; color: #991b1b; }
  .r-exp { font-size: .8rem; margin-top: .25rem; opacity: .85; }
</style>

<script>
const questions = [
  {
    id: 1,
    type: "trace",
    prompt: "What will be printed? (Enter exactly — separate values with a single space)",
    code: '#include <stdio.h>\nint x = 10;\n\nvoid change() {\n    static int x = 5;\n    x++;\n    printf("%d ", x);\n}\n\nint main() {\n    change();\n    change();\n    printf("%d", x);\n    return 0;\n}',
    answer: "6 7 10",
    explanation: "The <code>static int x</code> inside <code>change()</code> is separate from the global <code>x = 10</code>. Static locals retain their value across calls: first call x=5→6 (prints \"6 \"), second call x=6→7 (prints \"7 \"). The final <code>printf</code> in <code>main</code> accesses the global <code>x = 10</code> (prints \"10\")."
  },
  {
    id: 2,
    type: "trace",
    prompt: "What does the <strong>left</strong> program print? (Enter just the number)",
    code: "// Call-by-ADDRESS\nvoid increment(int *n) {\n    (*n)++;\n}\nint main() {\n    int a = 10;\n    increment(&a);\n    printf(\"%d\", a);\n}",
    answer: "11",
    explanation: "<code>&a</code> passes the address of <code>a</code>. Inside the function, <code>(*n)++</code> dereferences the pointer and increments the original variable. So <code>a</code> becomes 11 in <code>main</code>."
  },
  {
    id: 3,
    type: "trace",
    prompt: "What does this call-by-value program print? (Enter just the number)",
    code: "// Call-by-VALUE\nvoid increment(int n) {\n    n++;\n}\nint main() {\n    int a = 10;\n    increment(a);\n    printf(\"%d\", a);\n}",
    answer: "10",
    explanation: "<code>a</code> is passed by value — the function receives a copy. Incrementing the copy inside the function has no effect on <code>a</code> in <code>main</code>. <code>a</code> remains 10."
  },
  {
    id: 4,
    type: "mcq",
    prompt: "What is the <em>scope</em> of a <code>static</code> local variable?",
    options: [
      "A) The entire program (accessible everywhere)",
      "B) Only within the function where it is declared",
      "C) Only within the file where it is declared",
      "D) Only within the block where it is declared, not the whole function"
    ],
    answer: "B) Only within the function where it is declared",
    explanation: "A <code>static</code> local variable has the same <em>scope</em> as a regular local variable — it is visible only within the function (or block) where it is declared. What makes it <em>static</em> is its <em>lifetime</em>: it persists for the entire duration of the program instead of being destroyed when the function returns."
  },
  {
    id: 5,
    type: "mcq",
    prompt: "What is the difference between a global variable and a local variable regarding their <em>initial value</em>?",
    options: [
      "A) Both are initialized to 0 by default",
      "B) Global variables are automatically initialized to 0; local variables are uninitialized (contain garbage) unless explicitly set",
      "C) Local variables are automatically initialized to 0; global variables are uninitialized",
      "D) Neither is initialized automatically"
    ],
    answer: "B) Global variables are automatically initialized to 0; local variables are uninitialized (contain garbage) unless explicitly set",
    explanation: "Global (and static) variables are stored in the BSS/data segment and are zero-initialized by the C runtime before <code>main</code> executes. Local (auto) variables live on the stack and contain whatever bytes happen to be there — reading them without initialization is undefined behavior."
  }
];

const container = document.getElementById("quiz-body");
questions.forEach((q, i) => {
  const card = document.createElement("div");
  card.className = "q-card";
  card.innerHTML = `
    <span class="q-type type-${q.type}">${q.type}</span>
    <p class="q-prompt"><strong>Q${i+1}.</strong> ${q.prompt}</p>
    ${q.code ? `<pre>${q.code}</pre>` : ""}
    <div id="input-${q.id}"></div>`;
  container.appendChild(card);

  const inputArea = document.getElementById(`input-${q.id}`);
  if (q.type === "mcq") {
    const wrap = document.createElement("div");
    wrap.className = "mcq-opts";
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "mcq-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        wrap.querySelectorAll(".mcq-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      };
      wrap.appendChild(btn);
    });
    inputArea.appendChild(wrap);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "trace-input";
    ta.id = `ta-${q.id}`;
    ta.placeholder = "Type the output or value…";
    inputArea.appendChild(ta);
  }
});

function grade() {
  let correct = 0;
  const rows = [];
  questions.forEach((q, i) => {
    let userAns = "";
    if (q.type === "mcq") {
      const sel = document.querySelector(`#input-${q.id} .mcq-btn.selected`);
      userAns = sel ? sel.textContent.trim() : "";
      document.querySelectorAll(`#input-${q.id} .mcq-btn`).forEach(btn => {
        btn.disabled = true;
        if (btn.textContent.trim() === q.answer) btn.classList.add("correct");
        else if (btn.classList.contains("selected")) btn.classList.add("wrong");
      });
    } else {
      const ta = document.getElementById(`ta-${q.id}`);
      userAns = ta ? ta.value.trim() : "";
      ta.disabled = true;
    }
    const ok = userAns === q.answer;
    if (ok) correct++;
    rows.push({ q, i, ok, userAns });
  });

  const res = document.getElementById("results");
  res.style.display = "block";
  const pct = Math.round(correct / questions.length * 100);
  res.innerHTML = `
    <div class="score-head">Score: ${correct} / ${questions.length} (${pct}%)</div>
    ${rows.map(({q, i, ok, userAns}) => `
      <div class="r-row ${ok ? "r-correct" : "r-wrong"}">
        ${ok ? "✓" : "✗"} <strong>Q${i+1}</strong>
        ${ok ? "— Correct" : `— Your answer: <code>${userAns || "(none)"}</code> &nbsp;|&nbsp; Expected: <code>${q.answer}</code>`}
        ${!ok ? `<div class="r-exp">${q.explanation}</div>` : ""}
      </div>`).join("")}`;
  document.getElementById("submit-btn").disabled = true;
}
</script>
</body>
</html>
